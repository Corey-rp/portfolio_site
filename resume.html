<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume | Corey Richards-Persad</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .resume-wrapper {
      padding: 40px 0 60px;
    }

    .resume-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .resume-frame-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }

    iframe {
      width: 100%;
      height: 85vh;
      min-height: 600px;
      border: none;
      display: block;
    }

    .download-note {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 14px;
      text-align: center;
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">CRP</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="resume.html" class="active">Resume</a>
        <button class="theme-btn" id="themeToggle" onclick="toggleMode()">🌙</button>
      </div>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container">
      <div class="resume-wrapper">

        <div class="resume-header">
          <div>
            <span class="section-label">Resume</span>
            <h1 style="font-size:1.8rem;">Corey Richards-Persad</h1>
          </div>
          <a href="Corey_Richards-Persad_Resume.pdf" download class="btn btn-primary">
            ↓ Download PDF
          </a>
        </div>

        <div class="resume-frame-container">
          <iframe 
            src="Corey_Richards-Persad_Resume.pdf"
            title="Corey Richards-Persad Resume">
          </iframe>
        </div>

        <p class="download-note">
          Can't see the PDF? <a href="Corey_Richards-Persad_Resume.pdf" target="_blank">Open it in a new tab →</a>
        </p>

      </div>
    </div>
  </div>

  <footer style="border-top: 1px solid var(--border); padding: 28px 0; margin-top: auto;">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
      <span style="font-size:0.85rem; color:var(--text-muted);">© 2025 Corey Richards-Persad</span>
      <div style="display:flex; gap:16px;">
        <a href="mailto:coreyrich1210@gmail.com" style="font-size:0.85rem; color:var(--text-muted);">Email</a>
        <a href="https://www.linkedin.com/in/corey-richards-persad/" target="_blank" style="font-size:0.85rem; color:var(--text-muted);">LinkedIn</a>
      </div>
    </div>
  </footer>

  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark-mode");
      document.getElementById("themeToggle").textContent = "🌞";
    }
    function toggleMode() {
      document.body.classList.toggle("dark-mode");
      const isDark = document.body.classList.contains("dark-mode");
      localStorage.setItem("theme", isDark ? "dark" : "light");
      document.getElementById("themeToggle").textContent = isDark ? "🌞" : "🌙";
    }
  </script>

</body>
</html>
